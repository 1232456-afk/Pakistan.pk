<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Province Detail — Pakistan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x: hidden; }
    body { font-family:'DM Sans',sans-serif; background:#f7f4ef; color:#1a1a1a; overflow-x:hidden; }

    :root {
      --green: #0b6e4f;
      --dark:  #074a35;
      --gold:  #c8a84b;
      --cream: #f7f4ef;
      --white: #ffffff;
      --muted: #6b6b6b;
      --border: rgba(0,0,0,0.08);
      --radius: 14px;
    }

    /* BACK BUTTON */
    .back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 100;
      background: var(--dark); color: white;
      border: none; border-radius: 99px;
      padding: 10px 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      text-decoration: none;
      transition: transform .2s;
    }
    .back-btn:hover { transform: translateX(-3px); }

    /* HERO */
    .prov-hero {
      min-height: 300px;
      display: flex; align-items: flex-end;
      padding: 80px 5% 2.5rem;
      position: relative; overflow: hidden;
    }
    .prov-hero-bg {
      position: absolute; inset: 0;
      background: var(--dark);
    }
    .prov-hero-content { position: relative; z-index: 2; width: 100%; }
    .prov-hero-emoji { font-size: 64px; margin-bottom: 12px; display: block; }
    .prov-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700; color: white; line-height: 1.1;
      margin-bottom: 8px;
    }
    .prov-hero h1 em { font-style: normal; color: var(--gold); }
    .prov-capital { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 16px; }
    .prov-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .prov-badge {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 12px; font-weight: 500;
      padding: 5px 14px; border-radius: 99px;
    }

    /* CONTENT */
    .container { max-width: 900px; margin: 0 auto; padding: 0 5%; }
    section { padding: 50px 0; }
    section:nth-child(even) { background: white; }

    .sec-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--green); display: block; margin-bottom: 6px; }
    .sec-title  { font-family: 'Playfair Display', serif; font-size: clamp(22px,4vw,32px); font-weight: 700; margin-bottom: 1.5rem; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: var(--radius); padding: 1.25rem; border: 1px solid var(--border); text-align: center; }
    .stat-icon  { font-size: 28px; margin-bottom: 8px; }
    .stat-val   { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--green); line-height: 1; margin-bottom: 4px; }
    .stat-lbl   { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* CITIES GRID */
    .cities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; }
    .city-card {
      background: white; border-radius: var(--radius);
      padding: 1rem 1.25rem; border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      transition: transform .2s, box-shadow .2s;
    }
    .city-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .city-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .city-pop  { font-size: 12px; color: var(--muted); }
    .city-type { font-size: 10px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* PLACES */
    .places-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 1rem; }
    .place-card {
      background: var(--cream); border-radius: var(--radius);
      padding: 1.25rem; border: 1px solid var(--border);
      display: flex; gap: 12px; align-items: flex-start;
    }
    .place-icon { font-size: 28px; flex-shrink: 0; }
    .place-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .place-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

    /* FACTS TABLE */
    .facts-table { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .fact-row { display: flex; justify-content: space-between; gap: 1rem; padding: 11px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
    .fact-row:last-child { border: none; }
    .fact-row:nth-child(even) { background: var(--cream); }
    .fact-row .k { color: var(--muted); }
    .fact-row .v { font-weight: 600; text-align: right; }

    /* LIST */
    .info-list { display: flex; flex-direction: column; gap: 6px; }
    .info-list li { font-size: 13px; color: #444; padding: 8px 12px; background: white; border-radius: 8px; border: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start; list-style: none; }
    .info-list li::before { content: '▸'; color: var(--green); flex-shrink: 0; font-size: 11px; margin-top: 2px; }

    /* FOOTER */
    .prov-footer { background: var(--dark); color: rgba(255,255,255,0.6); text-align: center; padding: 2rem; font-size: 13px; }
    .prov-footer a { color: var(--gold); text-decoration: none; font-weight: 600; }

    @media (max-width: 540px) {
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .cities-grid { grid-template-columns: 1fr 1fr; }
      .places-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ── RENDER PAGE ───────────────────────────────────────────────
function renderProvince(key) {
  var p = PROVINCES[key];
  if (!p) {
    document.getElementById('prov-page').innerHTML =
      '<div style="text-align:center;padding:100px 20px;"><h2>Province not found</h2><a href="index.html">← Back</a></div>';
    return;
  }

  document.title = p.name + ' — Pakistan';

  var statsHtml = p.stats.map(function(s) {
    return '<div class="stat-card"><div class="stat-icon">' + s.icon + '</div><div class="stat-val">' + s.val + '</div><div class="stat-lbl">' + s.lbl + '</div></div>';
  }).join('');

  var factsHtml = p.facts.map(function(f) {
    return '<div class="fact-row"><span class="k">' + f.k + '</span><span class="v">' + f.v + '</span></div>';
  }).join('');

  var citiesHtml = p.cities.map(function(c) {
    return '<div class="city-card"><div class="city-name">' + c.name + '</div><div class="city-pop">Population: ' + c.pop + '</div><div class="city-type">' + c.type + '</div></div>';
  }).join('');

  var placesHtml = p.places.map(function(pl) {
    return '<div class="place-card"><div class="place-icon">' + pl.icon + '</div><div><div class="place-name">' + pl.name + '</div><div class="place-desc">' + pl.desc + '</div></div></div>';
  }).join('');

  var langsHtml = p.languages.map(function(l) {
    return '<li>' + l + '</li>';
  }).join('');

  var uniHtml = p.universities ? p.universities.map(function(u) {
    return '<li>' + u + '</li>';
  }).join('') : '';

  document.getElementById('prov-page').innerHTML =
    // HERO
    '<div class="prov-hero" style="background: linear-gradient(160deg,' + p.color + ' 0%, #1a1a1a 100%);">' +
      '<div class="prov-hero-bg"></div>' +
      '<div class="prov-hero-content">' +
        '<span class="prov-hero-emoji">' + p.emoji + '</span>' +
        '<h1>' + p.name + ' <em>' + p.urdu + '</em></h1>' +
        '<div class="prov-capital">Capital: ' + p.capital + '</div>' +
        '<div class="prov-badges">' +
          p.stats.map(function(s){ return '<span class="prov-badge">' + s.icon + ' ' + s.val + ' ' + s.lbl + '</span>'; }).join('') +
        '</div>' +
      '</div>' +
    '</div>' +

    // ABOUT
    '<section><div class="container">' +
      '<span class="sec-label">Overview</span>' +
      '<h2 class="sec-title">About ' + p.name + '</h2>' +
      '<p style="font-size:14px;color:#444;line-height:1.85;margin-bottom:1.5rem;">' + p.about + '</p>' +
      '<div class="stats-grid">' + statsHtml + '</div>' +
    '</div></section>' +

    // KEY FACTS
    '<section><div class="container">' +
      '<span class="sec-label">Key Facts</span>' +
      '<h2 class="sec-title">Important Information</h2>' +
      '<div class="facts-table">' + factsHtml + '</div>' +
    '</div></section>' +

    // CITIES
    '<section><div class="container">' +
      '<span class="sec-label">Major Cities</span>' +
      '<h2 class="sec-title">Cities of ' + p.name + '</h2>' +
      '<div class="cities-grid">' + citiesHtml + '</div>' +
    '</div></section>' +

    // FAMOUS PLACES
    '<section><div class="container">' +
      '<span class="sec-label">Tourism & Heritage</span>' +
      '<h2 class="sec-title">Famous Places</h2>' +
      '<div class="places-grid">' + placesHtml + '</div>' +
    '</div></section>' +

    // LANGUAGES & UNIVERSITIES
    '<section><div class="container" style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">' +
      '<div>' +
        '<span class="sec-label">Languages</span>' +
        '<h2 class="sec-title" style="font-size:20px;margin-bottom:1rem;">Languages Spoken</h2>' +
        '<ul class="info-list">' + langsHtml + '</ul>' +
      '</div>' +
      (uniHtml ? '<div>' +
        '<span class="sec-label">Education</span>' +
        '<h2 class="sec-title" style="font-size:20px;margin-bottom:1rem;">Major Universities</h2>' +
        '<ul class="info-list">' + uniHtml + '</ul>' +
      '</div>' : '') +
    '</div></section>' +

    // FOOTER
    '<div class="prov-footer">' +
      '<p>Part of <a href="index.html">Pakistan — Islamic Republic of Pakistan</a></p>' +
    '</div>';

  // Add responsive fix for languages/universities section on mobile
  var twoCol = document.querySelector('section:last-of-type .container');
  if (twoCol && window.innerWidth < 540) {
    twoCol.style.gridTemplateColumns = '1fr';
  }
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var prov   = params.get('p') || 'punjab';
  renderProvince(prov.toLowerCase().replace(/\s+/g,'_').replace(/-/g,'_'));
});
</script>
